<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Instrutor - CCP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- Variáveis Globais (Modo Escuro / Dark Mode) --- */
        :root {
            --bg-body: #0f172a; --bg-card: #1e293b; --bg-input: #334155;
            --text-main: #f8fafc; --text-muted: #94a3b8; --primary: #3b82f6;
            --primary-hover: #2563eb; --secondary: #10b981; --danger: #ef4444;
            --warning: #f59e0b; --border: #334155; --transition: all 0.3s ease;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', -apple-system, sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); margin: 0; line-height: 1.5; padding: 20px 15px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* --- Ecrã de Autenticação --- */
        .login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-body); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-card { background: var(--bg-card); padding: 40px; border-radius: 12px; border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }

        header { text-align: center; padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
        header h1 { margin: 0; font-size: 22pt; color: var(--primary); }

        /* --- Painéis e Cards --- */
        .card { background: var(--bg-card); border-radius: 10px; padding: 25px; border: 1px solid var(--border); margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
        h2 { font-size: 16pt; margin-top: 0; color: var(--primary); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        h3 { color: var(--text-main); font-size: 14pt; margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 10px;}

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 10pt; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        input, select, textarea { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-main); padding: 10px 12px; border-radius: 6px; outline: none; font-size: 10pt; transition: var(--transition); }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 5px rgba(59, 130, 246, 0.5); }
        
        /* --- Botões --- */
        .btn { padding: 12px 15px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; transition: var(--transition); display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-size: 10pt; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-secondary:hover { background: #0e9f6e; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-warning:hover { background: #d97706; }
        .btn-sm { padding: 6px 12px; font-size: 9pt; width: auto; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- Estrutura de Turmas --- */
        .turma-row { background: var(--bg-body); border: 1px solid var(--border); padding: 15px; border-radius: 6px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .turma-info { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 250px; }
        .turma-nome { font-size: 14pt; font-weight: bold; color: var(--primary); }
        .turma-detalhes { font-size: 11pt; color: var(--text-main); }
        
        .turma-vagas { text-align: right; display: flex; flex-direction: column; align-items: flex-end; justify-content: center; padding-right: 20px; border-right: 1px solid var(--border); margin-right: 20px; }
        .turma-vagas-count { font-size: 16pt; font-weight: bold; }
        .turma-vagas-label { font-size: 9pt; color: var(--text-muted); text-transform: uppercase; }

        /* --- Tabelas de Alunos --- */
        .styled-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 10pt; }
        .styled-table th { background: var(--bg-input); color: var(--primary); font-weight: bold; text-align: left; padding: 10px; border-bottom: 2px solid var(--border); }
        .styled-table td { padding: 10px; border-bottom: 1px solid var(--border); }

        /* --- Layout de Radio Buttons para Presença --- */
        .radio-group { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .radio-group label { display: flex; align-items: center; gap: 4px; font-size: 9pt; cursor: pointer; text-transform: none; color: var(--text-main); font-weight: normal; padding: 4px; border-radius: 4px; transition: background 0.2s;}
        .radio-group label:hover { background: var(--bg-input); }
    </style>
</head>
<body>

<div id="login-screen" class="login-screen">
    <div class="login-card">
        <h2 style="border:none; justify-content:center; color: var(--primary); font-size: 18pt; margin-bottom: 20px; padding: 0;">PORTAL DO INSTRUTOR</h2>
        <div class="form-group" style="margin-bottom: 15px; text-align: left;">
            <label>E-mail de Acesso</label>
            <input type="email" id="login-email" placeholder="O seu e-mail registado">
        </div>
        <div class="form-group" style="margin-bottom: 20px; text-align: left;">
            <label>Palavra-passe</label>
            <input type="password" id="login-senha" placeholder="******">
        </div>
        <button id="btn-login-submit" class="btn btn-primary" style="width: 100%; padding: 12px;" onclick="realizarLogin()">Aceder ao Portal</button>
        <p id="login-error-msg" style="color: var(--danger); font-size: 9pt; margin-top: 15px; display: none;"></p>
    </div>
</div>

<div class="container" id="main-content" style="display: none;">
    <header>
        <h1>ÁREA DOCENTE - CCP</h1>
        <p style="color: var(--text-muted); margin: 5px 0 0 0; font-weight: 600;">Instrutor(a): <span id="nome-instrutor-display" style="color: var(--secondary);"></span></p>
        <button class="btn btn-danger btn-sm" style="margin-top: 15px;" onclick="encerrarSessao()">Terminar Sessão</button>
    </header>

    <div class="card" id="painel-turmas">
        <h2>📚 As Minhas Turmas Ativas</h2>
        <div id="lista-turmas-container">
            <p style="text-align: center; color: var(--text-muted);">A carregar informações das turmas...</p>
        </div>
    </div>

    <div class="card" id="painel-gestao-turma" style="display: none; border-left: 4px solid var(--warning);">
        <h3 id="titulo-gestao-turma">⚙️ Gestão da Turma</h3>
        <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
            <button class="btn btn-primary btn-sm" onclick="mostrarListaAlunos()">👥 Informações de Alunos</button>
            <button class="btn btn-secondary btn-sm" onclick="mostrarPainelPresencas()">✅ Dar Presença</button>
            <button class="btn btn-warning btn-sm" onclick="mostrarPainelAvaliacoes()">📝 Avaliações</button>
            <button class="btn btn-danger btn-sm" onclick="mostrarPainelPragmatico()">📘 Conteúdo Pragmático</button>
        </div>
        
        <div id="conteudo-lista-alunos" style="display: none;">
            <div style="overflow-x: auto;">
                <table class="styled-table">
                    <thead>
                        <tr>
                            <th style="width: 50px; text-align: center;">Nº</th>
                            <th>Nome do Aluno</th>
                            <th>Telefone</th>
                            <th style="text-align: center;">Frequência</th>
                            <th style="text-align: center;">Média</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-alunos-matriculados"></tbody>
                </table>
            </div>
        </div>

        <div id="conteudo-presencas" style="display: none;">
            <div class="form-group" style="max-width: 300px; margin-bottom: 15px;">
                <label>Selecione a Data da Aula</label>
                <select id="select-data-aula" onchange="carregarChamadaData(this.value)">
                    <option value="">Aguarde o carregamento...</option>
                </select>
            </div>
            
            <div id="area-chamada" style="display: none;">
                <table class="styled-table">
                    <thead>
                        <tr>
                            <th>Nome do Aluno</th>
                            <th style="width: 450px; text-align: center;">Registro de Presença</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-chamada"></tbody>
                </table>
                <div style="text-align: right; margin-top: 15px;">
                    <button class="btn btn-secondary" id="btn-salvar-chamada" onclick="salvarChamada()">Gravar Presenças no Diário</button>
                </div>
            </div>
        </div>

        <div id="conteudo-avaliacoes" style="display: none;">
            <div style="border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                <h4 style="margin-top: 0; color: var(--primary);">Criar Nova Avaliação</h4>
                <div class="form-grid" style="align-items: end;">
                    <div class="form-group">
                        <label>Data da Avaliação</label>
                        <select id="nova-aval-data"><option value="">Aguarde...</option></select>
                    </div>
                    <div class="form-group">
                        <label>Tipo</label>
                        <select id="nova-aval-tipo">
                            <option value="Teórica">Teórica</option>
                            <option value="Prática">Prática</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Valor Máximo (0 a 100)</label>
                        <input type="number" id="nova-aval-valor" min="1" max="100" value="100">
                    </div>
                    <div class="form-group">
                        <button class="btn btn-primary" onclick="criarAvaliacao()">Criar Avaliação</button>
                    </div>
                </div>
            </div>

            <div style="border-top: 1px solid var(--border); padding-top: 15px;">
                <h4 style="margin-top: 0; color: var(--secondary);">Lançamento de Notas</h4>
                <div class="form-group" style="max-width: 400px; margin-bottom: 15px;">
                    <label>Selecione a Avaliação</label>
                    <select id="select-avaliacao" onchange="carregarLancamentoNotas(this.value)">
                        <option value="">A carregar avaliações...</option>
                    </select>
                </div>
                
                <div id="area-notas" style="display: none;">
                    <table class="styled-table">
                        <thead>
                            <tr>
                                <th>Nome do Aluno</th>
                                <th style="width: 250px; text-align: center;">Nota / Frequência</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-notas"></tbody>
                    </table>
                    <div style="text-align: right; margin-top: 15px;">
                        <button class="btn btn-secondary" id="btn-salvar-notas" onclick="salvarNotas()">Gravar Notas</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="conteudo-pragmatico" style="display: none;">
            <div class="form-group" style="max-width: 300px; margin-bottom: 15px;">
                <label>Selecione a Data da Aula</label>
                <select id="select-data-pragmatico" onchange="carregarFormularioPragmatico(this.value)">
                    <option value="">Aguarde o carregamento...</option>
                </select>
            </div>
            
            <div id="area-form-pragmatico" style="display: none;">
                <div class="form-group">
                    <label>Conteúdo Ministrado na Aula</label>
                    <textarea id="texto-pragmatico" rows="5" placeholder="Descreva o conteúdo dado neste dia..." style="resize: vertical;"></textarea>
                </div>
                <div style="text-align: right; margin-top: 15px;">
                    <button class="btn btn-secondary" id="btn-salvar-pragmatico" onclick="salvarPragmatico()">Gravar Conteúdo Pragmático</button>
                </div>
            </div>
        </div>

        <div style="text-align: right; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px;">
            <button class="btn btn-danger btn-sm" onclick="fecharGestaoTurma()">Fechar Gestão</button>
        </div>
    </div>
</div>

<script>
    const supabaseUrl = 'https://qdmityjaqwvcesejsexh.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkbWl0eWphcXd2Y2VzZWpzZXhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2ODU4NzAsImV4cCI6MjA5NDI2MTg3MH0.cqmB5B-lTaC1TaQwXuOlWjKjlnTufaGq6ndlm3K1uvI';
    const supa = window.supabase.createClient(supabaseUrl, supabaseKey);

    let utilizadorAtual = null;
    let nomeInstrutorValidado = "";
    
    let turmaAtiva = null;
    let alunosTurmaAtiva = [];
    let avaliacoesTurmaAtiva = [];

    document.addEventListener("DOMContentLoaded", async () => {
        try {
            const { data: { session }, error } = await supa.auth.getSession();
            if (session && !error) {
                utilizadorAtual = session.user;
                await iniciarSistema();
            }
        } catch (err) { console.error("Erro na verificação da sessão.", err); }
    });

    function mostrarErroLogin(msg) {
        const pMsg = document.getElementById('login-error-msg');
        pMsg.innerText = msg;
        pMsg.style.display = 'block';
    }

    async function realizarLogin() {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-senha').value;
        const pMsg = document.getElementById('login-error-msg');
        pMsg.style.display = 'none';

        if(!email || !password) { 
            mostrarErroLogin("Introduza o seu e-mail e palavra-passe."); 
            return; 
        }

        const btnLogin = document.getElementById('btn-login-submit');
        const textoOriginal = btnLogin.innerText;
        btnLogin.innerText = "A validar credenciais...";
        btnLogin.disabled = true;

        try {
            const { data, error } = await supa.auth.signInWithPassword({ email: email, password: password });
            
            if(error) { 
                mostrarErroLogin("Acesso recusado. Verifique as suas credenciais."); 
                btnLogin.innerText = textoOriginal;
                btnLogin.disabled = false;
                return; 
            }
            
            utilizadorAtual = data.user;
            await iniciarSistema();

        } catch (err) {
            console.error("Erro de sistema:", err);
            mostrarErroLogin("Erro crítico ao processar o login: " + err.message);
        } finally {
            btnLogin.innerText = textoOriginal;
            btnLogin.disabled = false;
        }
    }

    async function iniciarSistema() {
        try {
            document.getElementById('login-error-msg').style.display = 'none';

            const { data: perfilData, error: perfilError } = await supa
                .from('perfis') 
                .select('nivel_acesso')
                .eq('id', utilizadorAtual.id)
                .single();

            if (perfilError || !perfilData || (perfilData.nivel_acesso !== 'Instrutor' && perfilData.nivel_acesso !== 'Admin')) {
                throw new Error("Acesso não autorizado. O seu perfil não possui privilégios de Instrutor.");
            }

            const { data: instrutorData, error: instError } = await supa
                .from('instrutores')
                .select('nome')
                .eq('email', utilizadorAtual.email)
                .single();

            if (instError || !instrutorData) {
                throw new Error("O seu e-mail não está vinculado a um registo de docente na base de dados.");
            }

            nomeInstrutorValidado = instrutorData.nome;
            document.getElementById('nome-instrutor-display').innerText = nomeInstrutorValidado;

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            
            await carregarTurmasDoInstrutor();

        } catch (err) {
            mostrarErroLogin(err.message);
            if (utilizadorAtual) await supa.auth.signOut();
            utilizadorAtual = null;
        }
    }

    async function encerrarSessao() { 
        await supa.auth.signOut(); 
        window.location.reload(); 
    }

    async function carregarTurmasDoInstrutor() {
        const container = document.getElementById('lista-turmas-container');
        
        const [resTurmas, resAlunos] = await Promise.all([
            supa.from('turmas').select('*').eq('instrutor', nomeInstrutorValidado).eq('status', 'Ativo').order('curso_nome'),
            supa.from('alunos_ccp').select('cursos')
        ]);

        if (resTurmas.error || resAlunos.error) {
            container.innerHTML = '<p style="color: var(--danger);">Falha de comunicação com a base de dados ao carregar turmas.</p>';
            return;
        }

        const turmas = resTurmas.data;
        const alunosGeral = resAlunos.data || [];

        if (!turmas || turmas.length === 0) {
            container.innerHTML = '<p style="text-align: center; color: var(--text-muted);">Não possui turmas ativas vinculadas ao seu nome no momento.</p>';
            return;
        }

        let htmlFinal = '';

        turmas.forEach(turma => {
            const stringBuscaMatricula = `${turma.curso_nome} [${turma.identificador}]`;
            let contagemMatriculados = 0;
            
            alunosGeral.forEach(aluno => {
                if (aluno.cursos) {
                    const cursosAluno = aluno.cursos.split(' | ').map(c => c.trim());
                    if (cursosAluno.includes(stringBuscaMatricula)) {
                        contagemMatriculados++;
                    }
                }
            });

            const limiteVagas = turma.vagas_limite || 0;
            const corVagas = contagemMatriculados >= limiteVagas ? 'var(--danger)' : 'var(--secondary)';
            const turmaBase64 = btoa(encodeURIComponent(JSON.stringify(turma)));

            htmlFinal += `
            <div class="turma-row">
                <div class="turma-info">
                    <span class="turma-nome">${turma.curso_nome}</span>
                    <span class="turma-detalhes">Identificação: <strong>${turma.identificador}</strong></span>
                    <span class="turma-detalhes">Horário: ${turma.dia_semana} - ${turma.turno}</span>
                </div>
                
                <div class="turma-vagas">
                    <span class="turma-vagas-count" style="color: ${corVagas};">${contagemMatriculados} / ${limiteVagas}</span>
                    <span class="turma-vagas-label">Ocupação</span>
                </div>

                <div style="display: flex; align-items: center;">
                    <button class="btn btn-primary" onclick="abrirGestaoTurma('${turmaBase64}')">⚙️ Gerir Turma</button>
                </div>
            </div>`;
        });

        container.innerHTML = htmlFinal;
    }

    async function abrirGestaoTurma(turmaBase64) {
        turmaAtiva = JSON.parse(decodeURIComponent(atob(turmaBase64)));
        document.getElementById('titulo-gestao-turma').innerText = `⚙️ Gestão: ${turmaAtiva.curso_nome} [${turmaAtiva.identificador}]`;
        document.getElementById('painel-gestao-turma').style.display = 'block';
        
        document.getElementById('conteudo-lista-alunos').style.display = 'none';
        document.getElementById('conteudo-presencas').style.display = 'none';
        document.getElementById('conteudo-avaliacoes').style.display = 'none';
        document.getElementById('conteudo-pragmatico').style.display = 'none';
        
        window.scrollTo({ top: document.getElementById('painel-gestao-turma').offsetTop, behavior: 'smooth' });

        const stringBusca = `${turmaAtiva.curso_nome} [${turmaAtiva.identificador}]`;
        const { data: alunos, error } = await supa
            .from('alunos_ccp')
            .select('cpf, nome, cursos, telefone, email')
            .like('cursos', `%${stringBusca}%`)
            .order('nome');
        
        if(!error && alunos) {
            alunosTurmaAtiva = alunos.filter(a => {
                if(!a.cursos) return false;
                const c = a.cursos.split(' | ').map(x => x.trim());
                return c.includes(stringBusca);
            });
        } else {
            alunosTurmaAtiva = [];
        }
    }

    function fecharGestaoTurma() {
        document.getElementById('painel-gestao-turma').style.display = 'none';
        turmaAtiva = null;
        alunosTurmaAtiva = [];
        avaliacoesTurmaAtiva = [];
    }

    async function mostrarListaAlunos() {
        document.getElementById('conteudo-lista-alunos').style.display = 'block';
        document.getElementById('conteudo-presencas').style.display = 'none';
        document.getElementById('conteudo-avaliacoes').style.display = 'none';
        document.getElementById('conteudo-pragmatico').style.display = 'none';

        const tbody = document.getElementById('tbody-alunos-matriculados');
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:var(--text-muted);">A calcular frequências e médias...</td></tr>';
        
        if(alunosTurmaAtiva.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:var(--text-muted);">Nenhum aluno ativo nesta turma no momento.</td></tr>';
            return;
        }

        const stringBusca = `${turmaAtiva.curso_nome} [${turmaAtiva.identificador}]`;

        // 1. Busca dados para cálculo de Frequência
        const { data: presencas } = await supa.from('presencas').select('aluno_cpf, status, data_aula').eq('turma_identificador', stringBusca);
        let totalAulas = 0;
        let presencasAluno = {};
        
        if (presencas) {
            const datasUnicas = [...new Set(presencas.map(p => p.data_aula))];
            totalAulas = datasUnicas.length;
            presencas.forEach(p => {
                if(!presencasAluno[p.aluno_cpf]) presencasAluno[p.aluno_cpf] = 0;
                // Considera FJ como presença positiva conforme solicitado
                if(['P', 'A', 'SE', 'FJ'].includes(p.status)) {
                    presencasAluno[p.aluno_cpf]++;
                }
            });
        }

        // 2. Busca dados para cálculo da Média das Avaliações
        const { data: avaliacoes } = await supa.from('avaliacoes').select('id').eq('turma_identificador', stringBusca);
        let mediaAluno = {};
        
        if (avaliacoes && avaliacoes.length > 0) {
            const avalIds = avaliacoes.map(a => a.id);
            const { data: notas } = await supa.from('notas_avaliacoes').select('avaliacao_id, aluno_cpf, nota, faltou').in('avaliacao_id', avalIds);
            
            if (notas) {
                let alunoNotas = {};
                const avaliacoesLancadas = [...new Set(notas.map(n => n.avaliacao_id))].length;
                
                notas.forEach(n => {
                    if(!alunoNotas[n.aluno_cpf]) alunoNotas[n.aluno_cpf] = { soma: 0 };
                    let valorNota = n.faltou || !n.nota ? 0 : parseFloat(n.nota);
                    alunoNotas[n.aluno_cpf].soma += valorNota;
                });

                for (let cpf in alunoNotas) {
                    mediaAluno[cpf] = avaliacoesLancadas > 0 ? (alunoNotas[cpf].soma / avaliacoesLancadas) : 0;
                }
            }
        }

        tbody.innerHTML = '';
        let contador = 1;
        
        alunosTurmaAtiva.forEach(aluno => {
            let freqStr = '-';
            let corFreq = 'var(--text-main)';
            if (totalAulas > 0) {
                const pres = presencasAluno[aluno.cpf] || 0;
                const freq = Math.round((pres / totalAulas) * 100);
                freqStr = freq + '%';
                
                if (freq < 75) corFreq = 'var(--danger)';
                else if (freq === 75) corFreq = 'var(--primary)';
                else corFreq = 'var(--secondary)';
            }

            let mediaStr = '-';
            let corMedia = 'var(--text-main)';
            if (mediaAluno[aluno.cpf] !== undefined) {
                const med = mediaAluno[aluno.cpf];
                mediaStr = med.toFixed(1);
                
                if (med < 50) corMedia = 'var(--danger)';
                else if (med === 50) corMedia = 'var(--primary)';
                else corMedia = 'var(--secondary)';
            }

            tbody.innerHTML += `<tr>
                <td style="text-align: center; color: var(--text-muted);">${contador}</td>
                <td><strong>${aluno.nome}</strong></td>
                <td>${aluno.telefone || '-'}</td>
                <td style="text-align: center; font-weight: bold; color: ${corFreq};">${freqStr}</td>
                <td style="text-align: center; font-weight: bold; color: ${corMedia};">${mediaStr}</td>
            </tr>`;
            contador++;
        });
    }

    async function mostrarPainelPresencas() {
        document.getElementById('conteudo-lista-alunos').style.display = 'none';
        document.getElementById('conteudo-presencas').style.display = 'block';
        document.getElementById('conteudo-avaliacoes').style.display = 'none';
        document.getElementById('conteudo-pragmatico').style.display = 'none';
        document.getElementById('area-chamada').style.display = 'none';

        const selectDatas = document.getElementById('select-data-aula');
        selectDatas.innerHTML = '<option value="">A pesquisar aulas registadas...</option>';

        if (!turmaAtiva.data_inicio || !turmaAtiva.data_fim) {
            selectDatas.innerHTML = '<option value="">Datas não configuradas</option>';
            alert("Aviso: A coordenação ainda não definiu a Data de Início e Término para esta turma.");
            return;
        }

        const stringBusca = `${turmaAtiva.curso_nome} [${turmaAtiva.identificador}]`;
        
        const { data: datasGravadas, error } = await supa
            .from('presencas')
            .select('data_aula')
            .eq('turma_identificador', stringBusca);
            
        let datasOcultas = [];
        if (!error && datasGravadas) {
            datasOcultas = [...new Set(datasGravadas.map(p => p.data_aula))];
        }

        const datasValidas = calcularDatasAula(turmaAtiva.data_inicio, turmaAtiva.data_fim, turmaAtiva.dia_semana);
        
        selectDatas.innerHTML = '<option value="">Selecione a data...</option>';
        let totalDisponiveis = 0;

        datasValidas.forEach(data => {
            const isoDate = data.toISOString().split('T')[0];
            
            if (!datasOcultas.includes(isoDate)) {
                const displayDate = `${String(data.getUTCDate()).padStart(2,'0')}/${String(data.getUTCMonth()+1).padStart(2,'0')}/${data.getUTCFullYear()}`;
                selectDatas.innerHTML += `<option value="${isoDate}">${displayDate}</option>`;
                totalDisponiveis++;
            }
        });

        if (totalDisponiveis === 0) {
            selectDatas.innerHTML = '<option value="">Todas as aulas realizadas já foram registadas.</option>';
        }
    }

    function calcularDatasAula(dataInicioStr, dataFimStr, diaSemana) {
        const diasMapa = { "Domingo": 0, "Segunda": 1, "Terça": 2, "Quarta": 3, "Quinta": 4, "Sexta": 5, "Sábado": 6 };
        const diaAlvo = diasMapa[diaSemana];
        
        let atual = new Date(dataInicioStr);
        atual.setUTCHours(12, 0, 0, 0); 
        const fim = new Date(dataFimStr);
        fim.setUTCHours(12, 0, 0, 0);

        const limiteHoje = new Date();
        limiteHoje.setHours(23, 59, 59, 999);

        let datas = [];
        while (atual <= fim) {
            if (atual.getUTCDay() === diaAlvo) {
                if (atual <= limiteHoje) {
                    datas.push(new Date(atual));
                }
            }
            atual.setUTCDate(atual.getUTCDate() + 1);
        }
        return datas;
    }

    function calcularTodasDatasAula(dataInicioStr, dataFimStr, diaSemana) {
        const diasMapa = { "Domingo": 0, "Segunda": 1, "Terça": 2, "Quarta": 3, "Quinta": 4, "Sexta": 5, "Sábado": 6 };
        const diaAlvo = diasMapa[diaSemana];
        
        let atual = new Date(dataInicioStr);
        atual.setUTCHours(12, 0, 0, 0); 
        const fim = new Date(dataFimStr);
        fim.setUTCHours(12, 0, 0, 0);

        let datas = [];
        while (atual <= fim) {
            if (atual.getUTCDay() === diaAlvo) {
                datas.push(new Date(atual));
            }
            atual.setUTCDate(atual.getUTCDate() + 1);
        }
        return datas;
    }

    async function carregarChamadaData(dataSelecionada) {
        if(!dataSelecionada) {
            document.getElementById('area-chamada').style.display = 'none';
            return;
        }

        const tbody = document.getElementById('tbody-chamada');
        document.getElementById('area-chamada').style.display = 'block';

        tbody.innerHTML = '';
        if(alunosTurmaAtiva.length === 0) {
            tbody.innerHTML = '<tr><td colspan="2" style="text-align:center;">Sem alunos nesta turma.</td></tr>';
            return;
        }

        alunosTurmaAtiva.forEach((aluno) => {
            tbody.innerHTML += `
            <tr>
                <td><strong>${aluno.nome}</strong><br><span style="font-size: 8pt; color: var(--text-muted);">${aluno.cpf}</span></td>
                <td>
                    <div class="radio-group">
                        <label><input type="radio" name="pres-${aluno.cpf}" value="P" checked> Presente</label>
                        <label><input type="radio" name="pres-${aluno.cpf}" value="F"> Falta</label>
                        <label><input type="radio" name="pres-${aluno.cpf}" value="FJ"> Falta Just.</label>
                        <label><input type="radio" name="pres-${aluno.cpf}" value="A"> Atraso</label>
                        <label><input type="radio" name="pres-${aluno.cpf}" value="SE"> Saiu Cedo</label>
                    </div>
                </td>
            </tr>`;
        });
    }

    async function salvarChamada() {
        const dataSelecionada = document.getElementById('select-data-aula').value;
        if(!dataSelecionada) return alert("Selecione uma data válida no calendário acima.");

        const btn = document.getElementById('btn-salvar-chamada');
        btn.innerText = "A gravar Diário...";
        btn.disabled = true;

        const stringBusca = `${turmaAtiva.curso_nome} [${turmaAtiva.identificador}]`;
        const payloads = [];

        alunosTurmaAtiva.forEach(aluno => {
            const radios = document.getElementsByName(`pres-${aluno.cpf}`);
            let status = null;
            for(let r of radios) {
                if(r.checked && r.value !== "") status = r.value;
            }
            if(status) {
                payloads.push({
                    turma_identificador: stringBusca,
                    aluno_cpf: aluno.cpf,
                    data_aula: dataSelecionada,
                    status: status
                });
            }
        });

        try {
            await supa.from('presencas')
                .delete()
                .eq('turma_identificador', stringBusca)
                .eq('data_aula', dataSelecionada);

            if (payloads.length > 0) {
                const { error } = await supa.from('presencas').insert(payloads);
                if(error) throw error;
            }

            alert("Lista de presenças gravada com sucesso!");
            
            document.getElementById('area-chamada').style.display = 'none';
            await mostrarPainelPresencas();

        } catch (err) {
            alert("Ocorreu um erro ao gravar as presenças: " + err.message);
        } finally {
            btn.innerText = "Gravar Presenças no Diário";
            btn.disabled = false;
        }
    }

    // --- MÓDULO DE AVALIAÇÕES ---

    async function mostrarPainelAvaliacoes() {
        document.getElementById('conteudo-lista-alunos').style.display = 'none';
        document.getElementById('conteudo-presencas').style.display = 'none';
        document.getElementById('conteudo-pragmatico').style.display = 'none';
        document.getElementById('conteudo-avaliacoes').style.display = 'block';
        document.getElementById('area-notas').style.display = 'none';

        const selectData = document.getElementById('nova-aval-data');
        selectData.innerHTML = '<option value="">Selecione a data...</option>';

        if (!turmaAtiva.data_inicio || !turmaAtiva.data_fim) {
            selectData.innerHTML = '<option value="">Datas não configuradas</option>';
        } else {
            const todasDatas = calcularTodasDatasAula(turmaAtiva.data_inicio, turmaAtiva.data_fim, turmaAtiva.dia_semana);
            todasDatas.forEach(data => {
                const isoDate = data.toISOString().split('T')[0];
                const displayDate = `${String(data.getUTCDate()).padStart(2,'0')}/${String(data.getUTCMonth()+1).padStart(2,'0')}/${data.getUTCFullYear()}`;
                selectData.innerHTML += `<option value="${isoDate}">${displayDate}</option>`;
            });
        }

        await carregarAvaliacoesDaTurma();
    }

    async function criarAvaliacao() {
        const dataAval = document.getElementById('nova-aval-data').value;
        const tipo = document.getElementById('nova-aval-tipo').value;
        const valor = document.getElementById('nova-aval-valor').value;

        if(!dataAval || !tipo || !valor) return alert("Preencha todos os campos para criar a avaliação.");
        if(valor <= 0 || valor > 100) return alert("O valor máximo deve estar compreendido entre 1 e 100.");

        const stringBusca = `${turmaAtiva.curso_nome} [${turmaAtiva.identificador}]`;

        const { error } = await supa.from('avaliacoes').insert({
            turma_identificador: stringBusca,
            data_avaliacao: dataAval,
            tipo: tipo,
            valor_maximo: valor
        });

        if(error) return alert("Erro ao criar avaliação: " + error.message);

        alert("Avaliação configurada com sucesso!");
        document.getElementById('nova-aval-data').value = '';
        document.getElementById('nova-aval-valor').value = '100';
        
        await carregarAvaliacoesDaTurma();
    }

    async function carregarAvaliacoesDaTurma() {
        const stringBusca = `${turmaAtiva.curso_nome} [${turmaAtiva.identificador}]`;
        
        const { data: avaliacoes, error } = await supa.from('avaliacoes')
            .select('*')
            .eq('turma_identificador', stringBusca)
            .order('data_avaliacao');

        const selectAval = document.getElementById('select-avaliacao');
        selectAval.innerHTML = '<option value="">Selecione a avaliação registada...</option>';

        if(error || !avaliacoes) return;

        avaliacoesTurmaAtiva = avaliacoes || [];
        const avalIds = avaliacoesTurmaAtiva.map(a => a.id);

        let avaliacoesOcultas = [];
        if (avalIds.length > 0) {
            const { data: notasGravadas } = await supa.from('notas_avaliacoes')
                .select('avaliacao_id')
                .in('avaliacao_id', avalIds);
            
            if (notasGravadas) {
                avaliacoesOcultas = [...new Set(notasGravadas.map(n => n.avaliacao_id))];
            }
        }

        let totalDisponiveis = 0;
        
        avaliacoesTurmaAtiva.forEach(av => {
            if (!avaliacoesOcultas.includes(av.id)) {
                const parts = av.data_avaliacao.split('-');
                const displayDate = `${parts[2]}/${parts[1]}/${parts[0]}`;
                const label = `${displayDate} - ${av.tipo} (Vale ${av.valor_maximo})`;
                selectAval.innerHTML += `<option value="${av.id}">${label}</option>`;
                totalDisponiveis++;
            }
        });
        
        if (totalDisponiveis === 0 && avaliacoesTurmaAtiva.length > 0) {
            selectAval.innerHTML = '<option value="">Todas as avaliações já foram lançadas.</option>';
        }
        
        document.getElementById('area-notas').style.display = 'none';
    }

    async function carregarLancamentoNotas(avaliacaoId) {
        if(!avaliacaoId) {
            document.getElementById('area-notas').style.display = 'none';
            return;
        }

        const tbody = document.getElementById('tbody-notas');
        tbody.innerHTML = '<tr><td colspan="2" style="text-align:center; color: var(--text-muted);">A verificar banco de dados...</td></tr>';
        document.getElementById('area-notas').style.display = 'block';

        const avaliacao = avaliacoesTurmaAtiva.find(a => a.id === avaliacaoId);

        tbody.innerHTML = '';
        if(alunosTurmaAtiva.length === 0) {
            tbody.innerHTML = '<tr><td colspan="2" style="text-align:center;">Sem alunos nesta turma.</td></tr>';
            return;
        }

        alunosTurmaAtiva.forEach((aluno) => {
            tbody.innerHTML += `
            <tr>
                <td><strong>${aluno.nome}</strong><br><span style="font-size: 8pt; color: var(--text-muted);">${aluno.cpf}</span></td>
                <td>
                    <div style="display: flex; gap: 15px; align-items: center; justify-content: center;">
                        <input type="number" id="nota-${aluno.cpf}" min="0" max="${avaliacao.valor_maximo}" placeholder="0 a ${avaliacao.valor_maximo}" style="width: 100px; text-align:center;">
                        <label style="display:flex; align-items:center; gap:5px; cursor:pointer; font-size:9pt; color:var(--danger); font-weight:bold;">
                            <input type="checkbox" id="falta-${aluno.cpf}" onchange="toggleFaltaAvaliacao('${aluno.cpf}')"> Faltou
                        </label>
                    </div>
                </td>
            </tr>`;
        });
    }

    function toggleFaltaAvaliacao(cpf) {
        const chk = document.getElementById(`falta-${cpf}`);
        const inp = document.getElementById(`nota-${cpf}`);
        if(chk.checked) {
            inp.value = '';
            inp.disabled = true;
        } else {
            inp.disabled = false;
        }
    }

    async function salvarNotas() {
        const avaliacaoId = document.getElementById('select-avaliacao').value;
        if(!avaliacaoId) return alert("Selecione uma avaliação na lista.");

        const avaliacao = avaliacoesTurmaAtiva.find(a => a.id === avaliacaoId);
        const btn = document.getElementById('btn-salvar-notas');
        btn.innerText = "A gravar notas...";
        btn.disabled = true;

        const payloads = [];
        let validacaoOk = true;

        alunosTurmaAtiva.forEach(aluno => {
            const inpFalta = document.getElementById(`falta-${aluno.cpf}`);
            const inpNota = document.getElementById(`nota-${aluno.cpf}`);
            
            let nota = null;
            if(!inpFalta.checked) {
                if(inpNota.value !== '') {
                    nota = parseFloat(inpNota.value);
                    if(nota < 0 || nota > avaliacao.valor_maximo) {
                        validacaoOk = false;
                        alert(`A nota inserida para ${aluno.nome} é inválida. O valor deve estar entre 0 e ${avaliacao.valor_maximo}.`);
                    }
                }
            }

            if(inpFalta.checked || inpNota.value !== '') {
                 payloads.push({
                    avaliacao_id: avaliacaoId,
                    aluno_cpf: aluno.cpf,
                    nota: inpFalta.checked ? null : nota,
                    faltou: inpFalta.checked
                });
            }
        });

        if(!validacaoOk) {
            btn.innerText = "Gravar Notas";
            btn.disabled = false;
            return;
        }

        try {
            await supa.from('notas_avaliacoes').delete().eq('avaliacao_id', avaliacaoId);

            if(payloads.length > 0) {
                const { error } = await supa.from('notas_avaliacoes').insert(payloads);
                if(error) throw error;
            }

            alert("Pauta de notas registada com sucesso!");
            
            document.getElementById('area-notas').style.display = 'none';
            await carregarAvaliacoesDaTurma(); 

        } catch (err) {
            alert("Erro de comunicação ao gravar notas: " + err.message);
        } finally {
            btn.innerText = "Gravar Notas";
            btn.disabled = false;
        }
    }

        document.getElementById('conteudo-avaliacoes').style.display = 'none';

            .select('data_aula')

                selectDatas.innerHTML += `<option value="${isoDate}">${displayDate}</option>`;

        if (totalDisponiveis === 0) {

    function carregarFormularioPragmatico(dataSelecionada) {
        if(!dataSelecionada) {
            document.getElementById('area-form-pragmatico').style.display = 'none';
            return;
        }
        document.getElementById('texto-pragmatico').value = '';
        document.getElementById('area-form-pragmatico').style.display = 'block';
    }

    async function salvarPragmatico() {
        const dataSelecionada = document.getElementById('select-data-pragmatico').value;
        const texto = document.getElementById('texto-pragmatico').value.trim();

        if(!dataSelecionada) return alert("Selecione uma data.");
        if(!texto) return alert("Por favor, descreva o conteúdo ministrado na aula antes de gravar.");

        const btn = document.getElementById('btn-salvar-pragmatico');
        btn.innerText = "A gravar...";
        btn.disabled = true;

        const stringBusca = `${turmaAtiva.curso_nome} [${turmaAtiva.identificador}]`;

        try {
            const { error } = await supa.from('conteudo_pragmatico').insert({
                turma_identificador: stringBusca,
                data_aula: dataSelecionada,
                conteudo: texto
            });

            if(error) throw error;

            alert("Conteúdo pragmático registado com sucesso!");
            
            document.getElementById('area-form-pragmatico').style.display = 'none';
            await mostrarPainelPragmatico();

        } catch (err) {
            alert("Ocorreu um erro ao gravar o conteúdo: " + err.message);
        } finally {
            btn.innerText = "Gravar Conteúdo Pragmático";
            btn.disabled = false;
        }
    }
